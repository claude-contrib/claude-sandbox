services:
  claude:
    # image: ghcr.io/claude-contrib/claude-sandbox:${CLAUDE_DOCKER_TAG}
    image: 204120f0f42ab1b819c33d5922ba34c248f3530be9677811a08fd690a6239b8c
    working_dir: ${CLAUDE_DOCKER_WORKING_DIR}
    volumes:
      - claude-nix:/nix
      - claude-cache:/home/claude/.cache
      - claude-config:${CLAUDE_DOCKER_CONFIG_DIR}
      - ${CLAUDE_HOST_WORKING_DIR}:${CLAUDE_DOCKER_WORKING_DIR}
    environment:
      - GH_TOKEN=${GH_TOKEN:-$GITHUB_TOKEN}
      - CLAUDE_CONFIG_DIR=${CLAUDE_DOCKER_CONFIG_DIR}

volumes:
  claude-nix:
    name: claude-nix
  claude-cache:
    name: claude-cache
  claude-config:
    name: claude-config
